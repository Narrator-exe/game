services:
  ollama:
    image: ollama/ollama:latest
    container_name: npc_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 20

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command: "ollama pull ${OLLAMA_MODEL:-tinyllama:1.1b}"
    environment:
      OLLAMA_HOST: http://ollama:11434
    restart: "no"

  sim:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: npc_sim
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-tinyllama:1.1b}
      SIM_TICK_SECONDS: ${SIM_TICK_SECONDS:-8}
      MAX_MEMORIES: ${MAX_MEMORIES:-48}
    ports:
      - "8000:8000"

volumes:
  ollama_data:
